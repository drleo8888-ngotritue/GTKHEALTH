<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đổi mật khẩu — Cổng Sức Khỏe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f4c81 0%, #1e7a5e 100%); min-height: 100vh; }
    .card { animation: fadeUp .4s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="card bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8">
    <div class="text-center mb-6">
      <div class="w-14 h-14 bg-yellow-500 rounded-full flex items-center justify-center mx-auto mb-3">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-800">Đổi mật khẩu bắt buộc</h1>
      <p class="text-sm text-gray-500 mt-1">Bạn cần đổi mật khẩu mặc định để tiếp tục</p>
    </div>

    <form id="cpForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu hiện tại</label>
        <input id="current" type="password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-yellow-500"
          placeholder="Mật khẩu hiện tại" required />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu mới</label>
        <input id="newPw" type="password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-yellow-500"
          placeholder="Ít nhất 8 ký tự" required minlength="8" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Xác nhận mật khẩu mới</label>
        <input id="confirm" type="password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-yellow-500"
          placeholder="Nhập lại mật khẩu mới" required />
      </div>

      <div id="errMsg" class="hidden text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2"></div>
      <div id="okMsg" class="hidden text-sm text-green-700 bg-green-50 rounded-lg px-3 py-2"></div>

      <button type="submit" id="submitBtn"
        class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-semibold rounded-lg py-2.5 transition-colors">
        Đổi mật khẩu
      </button>
    </form>
  </div>

  <script>
    const token = localStorage.getItem('gvc_portal_token');
    if (!token) window.location.href = '/';

    document.getElementById('cpForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('errMsg');
      const ok = document.getElementById('okMsg');
      const btn = document.getElementById('submitBtn');
      err.classList.add('hidden');
      ok.classList.add('hidden');

      const newPw = document.getElementById('newPw').value;
      const confirm = document.getElementById('confirm').value;
      if (newPw !== confirm) {
        err.textContent = 'Mật khẩu mới không khớp';
        err.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Đang xử lý...';

      try {
        const res = await fetch('/api/auth/change-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify({
            currentPassword: document.getElementById('current').value,
            newPassword: newPw,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          err.textContent = data.error || 'Đổi mật khẩu thất bại';
          err.classList.remove('hidden');
        } else {
          localStorage.setItem('gvc_portal_token', data.token);
          ok.textContent = 'Đổi mật khẩu thành công! Đang chuyển trang...';
          ok.classList.remove('hidden');
          setTimeout(() => window.location.href = '/dashboard.html', 1500);
        }
      } catch {
        err.textContent = 'Không thể kết nối máy chủ';
        err.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Đổi mật khẩu';
      }
    });
  </script>
</body>
</html>
