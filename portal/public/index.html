<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập — Cổng Sức Khỏe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f4c81 0%, #1e7a5e 100%); min-height: 100vh; }
    .card { animation: fadeUp .4s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="card bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-800">Cổng Sức Khỏe Nhân Viên</h1>
      <p class="text-sm text-gray-500 mt-1" id="companyName">Goertek Vina</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mã nhân viên</label>
        <input id="empId" type="text" autocomplete="username"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase"
          placeholder="Nhập mã nhân viên" required />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
        <input id="password" type="password" autocomplete="current-password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Nhập mật khẩu" required />
      </div>

      <div id="errMsg" class="hidden text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2"></div>

      <button type="submit" id="loginBtn"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg py-2.5 transition-colors">
        Đăng nhập
      </button>
    </form>

    <p class="text-xs text-center text-gray-400 mt-6">
      Mật khẩu mặc định lần đầu: <span class="font-mono text-gray-600">Goertek@2024</span>
    </p>
  </div>

  <script>
    // Load company name
    fetch('/api/auth/config').then(r => r.json()).then(d => {
      if (d.companyName) document.getElementById('companyName').textContent = d.companyName;
    }).catch(() => {});

    // Redirect if already logged in
    const token = localStorage.getItem('gvc_portal_token');
    if (token) window.location.href = '/dashboard.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errMsg');
      err.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Đang đăng nhập...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            employeeId: document.getElementById('empId').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          err.textContent = data.error || 'Đăng nhập thất bại';
          err.classList.remove('hidden');
        } else {
          localStorage.setItem('gvc_portal_token', data.token);
          if (data.mustChange) {
            window.location.href = '/change-password.html';
          } else {
            window.location.href = '/dashboard.html';
          }
        }
      } catch {
        err.textContent = 'Không thể kết nối máy chủ. Vui lòng thử lại.';
        err.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Đăng nhập';
      }
    });
  </script>
</body>
</html>
